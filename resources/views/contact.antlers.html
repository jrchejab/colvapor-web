<div class="bg-gray-50 border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl font-bold text-gray-900">{{ title }}</h1>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="grid md:grid-cols-2 gap-12">
        <div>
            <div class="prose prose-lg prose-headings:text-gray-900 mb-8">
                {{ content }}
            </div>
            <div class="space-y-4 text-sm text-gray-600">
                <div class="flex items-start gap-3">
                    <span class="font-semibold text-gray-900 min-w-[80px]">PBX:</span>
                    <span>(57)(1) 8941096</span>
                </div>
                <div class="flex items-start gap-3">
                    <span class="font-semibold text-gray-900 min-w-[80px]">Dirección:</span>
                    <span>CR 1 # 3-52, Parque Industrial Tecplas<br>Mosquera - Cundinamarca</span>
                </div>
            </div>
        </div>
        <div>
            {{ form:create in="contacto" }}
                <div class="space-y-4">
                    {{ if errors }}
                        <div class="bg-red-50 text-red-700 p-4 rounded-lg text-sm">
                            {{ errors }}
                                {{ value }}<br>
                            {{ /errors }}
                        </div>
                    {{ /if }}
                    {{ if success }}
                        <div class="bg-green-50 text-green-700 p-4 rounded-lg text-sm">
                            {{ success }}
                        </div>
                    {{ /if }}
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre</label>
                        <input type="text" name="nombre" value="{{ old:nombre }}" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <input type="email" name="email" value="{{ old:email }}" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Mensaje</label>
                        <textarea name="mensaje" rows="5" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">{{ old:mensaje }}</textarea>
                    </div>
                    <button type="submit" class="px-6 py-3 bg-gray-900 text-white text-sm font-semibold rounded-md hover:bg-gray-800 transition-colors">Enviar</button>
                </div>
            {{ /form:create }}
        </div>
    </div>
</div>
