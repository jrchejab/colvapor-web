<div class="bg-gray-50 border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <a href="/productos" class="inline-flex items-center text-gray-500 hover:text-gray-700 mb-4 transition-colors text-xs uppercase tracking-wider font-semibold">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Volver a productos
        </a>
        <h1 class="text-3xl font-bold text-gray-900">{{ title }}</h1>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        {{ collection:products :taxonomy:categories="slug" }}
            <a href="{{ url }}" class="group block p-6 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-lg transition-all duration-200">
                <h2 class="text-lg font-semibold text-gray-900 group-hover:text-gray-600 transition-colors">{{ title }}</h2>
            </a>
        {{ /collection:products }}
    </div>
</div>
