<style>
.page-content {
    font-family: 'Roboto', sans-serif;
    font-size: 17px;
    line-height: 1.65;
    color: #111827;
}
.page-content h2 {
    font-family: 'Roboto', sans-serif;
    font-size: 38px;
    font-weight: 600;
    line-height: 1.3em;
    letter-spacing: 0;
    margin-top: 0;
    margin-bottom: 0.75em;
}
.page-content p {
    margin-bottom: 1.6em;
}
.page-content ul {
    list-style: disc;
    padding-left: 1.5em;
    margin-bottom: 1.6em;
}
.page-content ul li {
    margin-bottom: 0.5em;
}
.page-content strong {
    font-weight: 700;
    color: #111827;
}
</style>

<article class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="grid md:grid-cols-2 gap-8 items-center">
        <div class="page-content">
            {{ content }}
        </div>
        {{ if image }}
            <div class="flex flex-col gap-6 items-center">
                {{ image }}
                    <figure class="m-0">
                        <img src="/img/{{ value }}"
                             alt="{{ title }}" class="w-full h-auto max-w-lg object-contain">
                    </figure>
                {{ /image }}
            </div>
        {{ /if }}
    </div>
</article>
