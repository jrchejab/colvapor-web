<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

    <div class="flex flex-wrap gap-3 mb-16">
        {{ taxonomy:categories sort="order" }}
            <a href="/productos/{{ slug }}"
               class="px-6 py-3 text-sm font-bold text-black uppercase no-underline transition-all duration-200 {{ if slug === category }}bg-[#7bdcb5] hover:bg-[#6bcba5]{{ else }}bg-[#D1D5DB] hover:bg-[#c1c5cb]{{ /if }}">
                {{ title }}
            </a>
        {{ /taxonomy:categories }}
    </div>

    <div class="grid md:grid-cols-2 gap-x-8 gap-y-12">
        {{ collection:products :taxonomy:categories="category" }}
            <div class="border border-[#D1D5DB] p-4">
                <p class="text-center font-bold text-base pb-3 mb-5 border-b border-[#D1D5DB] leading-tight">
                    {{ title | upper }}<br>
                    <span class="text-sm font-normal text-gray-600">{{ title_en }}</span>
                </p>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        {{ if image }}
                            <figure class="mx-auto">
                                <img src="/img/{{ image }}"
                                     alt="{{ title }}" class="w-full h-auto">
                            </figure>
                        {{ /if }}
                    </div>
                    <div>
                        <div class="bg-[#F0F5FA] border border-[#D1D5DB] p-[1.25em_2.375em] text-sm font-['Courier_10_Pitch',_Courier,_monospace] leading-relaxed">
                            {{ content | markdown }}
                        </div>
                    </div>
                </div>
                <div class="mt-3 text-center">
                    <a href="{{ url }}" class="text-xs font-semibold text-gray-600 hover:text-gray-900 underline uppercase tracking-wider">Ver detalle &rarr;</a>
                </div>
            </div>
        {{ /collection:products }}
    </div>
</div>
