services:
  app:
    image: 'php:8.4-fpm'
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - 'public-assets:/var/www/html/public'
      - 'storage:/var/www/html/storage'
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    depends_on:
      app:
        condition: service_started
    volumes:
      - 'public-assets:/var/www/html/public:ro'
      - 'storage:/var/www/html/storage:ro'

volumes:
  public-assets:
  storage:
